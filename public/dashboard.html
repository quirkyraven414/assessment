<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Telemetry Dashboard - DEV001</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .card .unit {
            color: #999;
            font-size: 14px;
        }

        .card.temperature .value { color: #f59e0b; }
        .card.voltage .value { color: #3b82f6; }
        .card.current .value { color: #8b5cf6; }
        .card.energy .value { color: #10b981; }

        .alerts-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .alerts-section h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .alert-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
            background: #f9fafb;
        }

        .alert-item.CRITICAL {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .alert-item.HIGH {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .alert-item.MEDIUM {
            border-left-color: #3b82f6;
            background: #eff6ff;
        }

        .alert-item.LOW {
            border-left-color: #10b981;
            background: #f0fdf4;
        }

        .alert-item .alert-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .alert-item .alert-type {
            font-weight: bold;
            color: #333;
        }

        .alert-item .alert-time {
            color: #999;
            font-size: 12px;
        }

        .alert-item .alert-message {
            color: #666;
            font-size: 14px;
        }

        .telemetry-log {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .telemetry-log h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .log-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #f9fafb;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
        }

        .log-item .timestamp {
            color: #3b82f6;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .test-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .test-button:hover {
            background: #5568d3;
        }

        .test-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🌡️ IoT Telemetry Dashboard</h1>
                <p style="color: #666; margin-top: 5px;">Device: DEV001 - Temperature Sensor 1</p>
            </div>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
                <button class="test-button" onclick="sendTestData()">Send Test Data</button>
            </div>
        </div>

        <div class="grid">
            <div class="card temperature">
                <h3>Temperature</h3>
                <div class="value" id="temperature">--</div>
                <div class="unit">°C</div>
            </div>
            <div class="card voltage">
                <h3>Voltage</h3>
                <div class="value" id="voltage">--</div>
                <div class="unit">V</div>
            </div>
            <div class="card current">
                <h3>Current</h3>
                <div class="value" id="current">--</div>
                <div class="unit">A</div>
            </div>
            <div class="card energy">
                <h3>Energy</h3>
                <div class="value" id="energy">--</div>
                <div class="unit">kWh</div>
            </div>
        </div>

        <div class="alerts-section">
            <h2>🚨 Recent Alerts</h2>
            <div id="alertsList">
                <div class="no-data">No alerts yet</div>
            </div>
        </div>

        <div class="telemetry-log">
            <h2>📊 Telemetry Stream</h2>
            <div id="telemetryLog">
                <div class="no-data">Waiting for data...</div>
            </div>
        </div>
    </div>

    <script>
        const DEVICE_ID = 'DEV001';
        const API_KEY = 'dev001_api_key_12345';
        const API_URL = 'http://localhost:3000';
        
        let alerts = [];
        let telemetryLog = [];

        // Simulate WebSocket connection (since we don't have WebSocket server yet)
        // In production, this would be: const ws = new WebSocket('ws://localhost:3001');
        
        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.classList.remove('disconnected');
                text.textContent = 'Connected';
                text.style.color = '#10b981';
            } else {
                dot.classList.add('disconnected');
                text.textContent = 'Disconnected';
                text.style.color = '#ef4444';
            }
        }

        function updateTelemetry(data) {
            document.getElementById('temperature').textContent = data.temperature.toFixed(1);
            document.getElementById('voltage').textContent = data.voltage.toFixed(1);
            document.getElementById('current').textContent = data.current.toFixed(1);
            document.getElementById('energy').textContent = data.energy_kwh.toFixed(2);

            // Add to log
            telemetryLog.unshift({
                timestamp: new Date(data.timestamp).toLocaleTimeString(),
                data: data
            });

            if (telemetryLog.length > 20) {
                telemetryLog = telemetryLog.slice(0, 20);
            }

            renderTelemetryLog();
        }

        function addAlert(alert) {
            alerts.unshift(alert);
            if (alerts.length > 10) {
                alerts = alerts.slice(0, 10);
            }
            renderAlerts();
        }

        function renderAlerts() {
            const container = document.getElementById('alertsList');
            
            if (alerts.length === 0) {
                container.innerHTML = '<div class="no-data">No alerts yet</div>';
                return;
            }

            container.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.severity}">
                    <div class="alert-header">
                        <span class="alert-type">${alert.alert_type.replace(/_/g, ' ')}</span>
                        <span class="alert-time">${new Date(alert.triggered_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="alert-message">${alert.message}</div>
                </div>
            `).join('');
        }

        function renderTelemetryLog() {
            const container = document.getElementById('telemetryLog');
            
            if (telemetryLog.length === 0) {
                container.innerHTML = '<div class="no-data">Waiting for data...</div>';
                return;
            }

            container.innerHTML = telemetryLog.map(log => `
                <div class="log-item">
                    <span class="timestamp">[${log.timestamp}]</span>
                    T: ${log.data.temperature}°C | V: ${log.data.voltage}V | 
                    I: ${log.data.current}A | E: ${log.data.energy_kwh}kWh
                </div>
            `).join('');
        }

        async function sendTestData() {
            const data = {
                temperature: Math.random() * 60,
                energy_kwh: 100 + Math.random() * 200,
                voltage: 200 + Math.random() * 40,
                current: 30 + Math.random() * 50,
                status: 'active',
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(`${API_URL}/telemetry`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                console.log('Sent:', result);

                // Simulate receiving the data back (in production, this comes via WebSocket)
                setTimeout(() => {
                    updateTelemetry(data);
                    
                    // Simulate alert if temperature is high
                    if (data.temperature > 30 && data.temperature <= 50) {
                        addAlert({
                            alert_type: 'TEMPERATURE_HIGH',
                            severity: 'HIGH',
                            message: `Temperature ${data.temperature.toFixed(1)}°C exceeds threshold (30°C)`,
                            triggered_at: new Date().toISOString()
                        });
                    } else if (data.temperature > 50) {
                        addAlert({
                            alert_type: 'TEMPERATURE_CRITICAL',
                            severity: 'CRITICAL',
                            message: `CRITICAL: Temperature ${data.temperature.toFixed(1)}°C exceeds critical threshold (50°C)`,
                            triggered_at: new Date().toISOString()
                        });
                    }
                }, 500);

            } catch (error) {
                console.error('Error sending data:', error);
                updateStatus(false);
            }
        }

        // Poll for latest telemetry every 2 seconds
        async function pollTelemetry() {
            try {
                const response = await fetch(`${API_URL}/devices/${DEVICE_ID}/latest`, {
                    headers: {
                        'x-api-key': API_KEY
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    updateTelemetry(data);
                    updateStatus(true);
                }
            } catch (error) {
                console.error('Error polling:', error);
                updateStatus(false);
            }
        }

        // Initialize
        updateStatus(true);
        setInterval(pollTelemetry, 2000);

        // Send initial test data
        setTimeout(() => sendTestData(), 1000);
    </script>
</body>
</html>
